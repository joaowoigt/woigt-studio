<?xml version="1.0" encoding="UTF-8"?>
<!--
  w² Agência — Logo Principal (fundo escuro)
  Uso: hero da landing, navbar dark, OG image, banner LinkedIn
  Cores: W amarelo elétrico, ² magenta, separador + AGÊNCIA brancos
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&amp;display=swap');
      .w-letter { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 180px; }
      .sup { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 88px; }
      .agencia { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 700; font-size: 64px; letter-spacing: 8px; }
    </style>
  </defs>

  <rect width="720" height="200" fill="#0D0D0D"/>

  <!-- W (amarelo elétrico) -->
  <text x="40" y="158" class="w-letter" fill="#F5C100" letter-spacing="-4">W</text>

  <!-- ² superscript (magenta) -->
  <text x="178" y="78" class="sup" fill="#E01A5A">2</text>

  <!-- Separador vertical -->
  <line x1="280" y1="50" x2="280" y2="155" stroke="#FFFFFF" stroke-width="2"/>

  <!-- AGÊNCIA (branco, tracked wide) -->
  <text x="312" y="128" class="agencia" fill="#FFFFFF">AGÊNCIA</text>
</svg>
