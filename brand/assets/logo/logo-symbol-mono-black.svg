<?xml version="1.0" encoding="UTF-8"?>
<!--
  w² Agência — Símbolo W² monocromático preto
  Uso: contextos single-color em fundos claros (carimbo, gravação, estampa, fax, jornal)
  Cor: preto sobre transparente
  Mantém ² superscript pra preservar a identidade — sem o destaque magenta
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&amp;display=swap');
      .w-letter { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 220px; }
      .sup { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 110px; }
    </style>
  </defs>

  <text x="20" y="200" class="w-letter" fill="#0D0D0D" letter-spacing="-6">W</text>
  <text x="240" y="82" class="sup" fill="#0D0D0D">2</text>
</svg>
