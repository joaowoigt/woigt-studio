<?xml version="1.0" encoding="UTF-8"?>
<!--
  w² Agência — Símbolo W² (colorido, fundo transparente)
  Uso: avatar de perfil sem frame, watermark, marcação em peças visuais, ícone de app
  Cores: W amarelo elétrico, ² magenta — sobre fundo transparente
  Versão isolada do símbolo, sem o wordmark "AGÊNCIA"
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&amp;display=swap');
      .w-letter { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 220px; }
      .sup { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; font-size: 110px; }
    </style>
  </defs>

  <!-- W (amarelo elétrico) -->
  <text x="20" y="200" class="w-letter" fill="#F5C100" letter-spacing="-6">W</text>

  <!-- ² superscript (magenta) -->
  <text x="180" y="100" class="sup" fill="#E01A5A">2</text>
</svg>
